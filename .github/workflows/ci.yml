name: FanQuest quality gate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Verify live submission surface
        run: |
          npm run start > /tmp/fanquest.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/demo > /dev/null; then
              break
            fi
            sleep 1
          done
          npm run verify:submission
